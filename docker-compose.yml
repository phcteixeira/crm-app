version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: crm-app
    restart: always
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - EVOLUTION_API_URL=${EVOLUTION_API_URL}
      - EVOLUTION_API_KEY=${EVOLUTION_API_KEY}
      - PORT=3000
    networks:
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.crm-app.rule=Host(`${DOMAIN}`)"
      - "traefik.http.routers.crm-app.entrypoints=websecure"
      - "traefik.http.routers.crm-app.tls.certresolver=letsencrypt"
      - "traefik.http.services.crm-app.loadbalancer.server.port=3000"

networks:
  proxy:
    external: true
