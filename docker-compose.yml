version: '3.8'

services:
  app:
    image: ghcr.io/phcteixeira/crm-app:latest
    container_name: crm-app
    restart: always
    environment:
      - DATABASE_URL=postgresql://${DB_USER}:${DB_PASSWORD}@db:5432/${DB_NAME}?sslmode=disable
      - EVOLUTION_API_URL=${EVOLUTION_API_URL}
      - EVOLUTION_API_KEY=${EVOLUTION_API_KEY}
    networks:
      - internal
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.crm-app.rule=Host(`${DOMAIN}`)"
      - "traefik.http.routers.crm-app.entrypoints=websecure"
      - "traefik.http.routers.crm-app.tls.certresolver=letsencrypt"
      - "traefik.http.services.crm-app.loadbalancer.server.port=3000"
    depends_on:
      - db

  db:
    image: postgres:15-alpine
    container_name: crm-db
    restart: always
    environment:
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=${DB_NAME}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - internal

networks:
  internal:
  proxy:
    external: true

volumes:
  pgdata:
