version: '3.8'

services:
  app:
    image: ${APP_IMAGE:-ghcr.io/phcteixeira/crm-app:latest}
    container_name: crm-app
    restart: always
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - EVOLUTION_API_URL=${EVOLUTION_API_URL}
      - EVOLUTION_API_KEY=${EVOLUTION_API_KEY}
      - DOMAIN=${DOMAIN}
      - PORT=${PORT:-3005}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - SOKETI_HOST=soketi
      - SOKETI_PORT=6001
      - SOKETI_DEFAULT_APP_ID=crm-app
      - SOKETI_DEFAULT_APP_KEY=soketi-crm-key
      - SOKETI_DEFAULT_APP_SECRET=soketi-crm-secret
      - AUTH_SECRET=${AUTH_SECRET}
      - AUTH_URL=https://crm.ckmedia.com.br
    depends_on:
      - redis
      - soketi
    networks:
      - maracainet
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.crm-app.rule=Host(`crm.ckmedia.com.br`)"
      - "traefik.http.routers.crm-app.entrypoints=websecure"
      - "traefik.http.routers.crm-app.tls.certresolver=letsencryptresolver"
      - "traefik.http.services.crm-app.loadbalancer.server.port=${PORT:-3005}"

  # Redis for Background Jobs (BullMQ) and Soketi Pub/Sub
  redis:
    image: redis:7-alpine
    container_name: crm-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - crm_redis_data:/data
    networks:
      - maracainet

  # Soketi for real-time WebSockets (ActionCable replacement)
  soketi:
    image: quay.io/soketi/soketi:1.6-16-debian
    container_name: crm-soketi
    restart: always
    environment:
      - SOKETI_DEBUG=1
      - SOKETI_DEFAULT_APP_ID=crm-app
      - SOKETI_DEFAULT_APP_KEY=soketi-crm-key
      - SOKETI_DEFAULT_APP_SECRET=soketi-crm-secret
    ports:
      - "6001:6001"
      - "9601:9601"
    networks:
      - maracainet
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.soketi.rule=Host(`crm.ckmedia.com.br`) && (PathPrefix(`/app`) || PathPrefix(`/apps`))"
      - "traefik.http.routers.soketi.entrypoints=websecure"
      - "traefik.http.routers.soketi.tls.certresolver=letsencryptresolver"
      - "traefik.http.services.soketi.loadbalancer.server.port=6001"

  # Background Worker (Sidekiq replacement)
  worker:
    image: ${APP_IMAGE:-ghcr.io/phcteixeira/crm-app:latest}
    container_name: crm-worker
    restart: always
    command: node worker.js
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - EVOLUTION_API_URL=${EVOLUTION_API_URL}
      - EVOLUTION_API_KEY=${EVOLUTION_API_KEY}
      - REDIS_URL=redis://redis:6379
      - SOKETI_HOST=soketi
      - SOKETI_PORT=6001
      - SOKETI_DEFAULT_APP_ID=crm-app
      - SOKETI_DEFAULT_APP_KEY=soketi-crm-key
      - SOKETI_DEFAULT_APP_SECRET=soketi-crm-secret
    depends_on:
      - redis
      - soketi
    networks:
      - maracainet

volumes:
  crm_redis_data:

networks:
  maracainet:
    external: true
